<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>煜子 & 袁子 ❤ 恋爱纪念</title>
<style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 background: #0a0a1a;
 overflow: hidden;
 font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
 width: 100vw;
 height: 100vh;
 }
 canvas#particles {
 position: fixed;
 top: 0; left: 0;
 width: 100%; height: 100%;
 z-index: 1;
 }
 .overlay {
 position: fixed;
 top: 0; left: 0;
 width: 100%; height: 100%;
 z-index: 2;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 pointer-events: none;
 }
 .title {
 color: #ff6b9d;
 font-size: clamp(18px, 3vw, 28px);
 letter-spacing: 6px;
 margin-bottom: 10px;
 text-shadow: 0 0 20px rgba(255,107,157,0.6), 0 0 40px rgba(255,107,157,0.3);
 font-weight: 300;
 }
 .days-container {
 display: flex;
 align-items: baseline;
 gap: 8px;
 margin-bottom: 6px;
 }
 .days-number {
 color: #fff;
 font-size: clamp(48px, 10vw, 96px);
 font-weight: 700;
 text-shadow: 0 0 30px rgba(255,107,157,0.5), 0 0 60px rgba(255,107,157,0.2);
 line-height: 1;
 }
 .days-label {
 color: #ff6b9d;
 font-size: clamp(16px, 3vw, 28px);
 text-shadow: 0 0 15px rgba(255,107,157,0.4);
 }
 .date-label {
 color: rgba(255,255,255,0.4);
 font-size: clamp(11px, 1.5vw, 14px);
 letter-spacing: 3px;
 }
 .names-row {
 position: fixed;
 bottom: 8%;
 left: 0; right: 0;
 display: flex;
 justify-content: space-around;
 align-items: center;
 z-index: 2;
 pointer-events: none;
 padding: 0 5%;
 }
 .name-tag {
 text-align: center;
 }
 .name-tag span {
 color: rgba(255,255,255,0.7);
 font-size: clamp(13px, 2vw, 18px);
 letter-spacing: 4px;
 text-shadow: 0 0 10px rgba(255,107,157,0.3);
 }
 .name-tag .emoji-label {
 display: block;
 font-size: clamp(11px, 1.5vw, 13px);
 color: rgba(255,255,255,0.3);
 margin-top: 4px;
 letter-spacing: 2px;
 }
 .bg-glow {
 position: fixed;
 border-radius: 50%;
 filter: blur(80px);
 opacity: 0.15;
 z-index: 0;
 pointer-events: none;
 }
 .glow1 { width: 400px; height: 400px; background: #ff3366; top: 20%; left: 10%; }
 .glow2 { width: 300px; height: 300px; background: #ff6b9d; top: 40%; right: 10%; }
 .glow3 { width: 250px; height: 250px; background: #c44dff; bottom: 10%; left: 40%; }
</style>
</head>
<body>
<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>
<div class="bg-glow glow3"></div>
<canvas id="particles"></canvas>
<div class="overlay">
 <div class="title">煜 子 ❤ 袁 子</div>
 <div class="days-container">
 <div class="days-number" id="dayCount">0</div>
 <div class="days-label">天</div>
 </div>
 <div class="date-label">2025 . 05 . 20 — 至今</div>
</div>
<div class="names-row">
 <div class="name-tag">
 <span>煜 子</span>
 <span class="emoji-label">🍅 番茄</span>
 </div>
 <div class="name-tag">
 <span>袁 子</span>
 <span class="emoji-label">🦋 蝴蝶</span>
 </div>
</div>

<script>
// === Day Counter ===
const startDate = new Date(2025, 4, 20);
const now = new Date();
const diffDays = Math.floor(Math.abs(now - startDate) / (1000 * 60 * 60 * 24));
document.getElementById('dayCount').textContent = diffDays;

// === Canvas Setup ===
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
 W = canvas.width = window.innerWidth;
 H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); time = 0; createAll(); });

function rand(min, max) { return Math.random() * (max - min) + min; }

// =============================================
// TOMATO SHAPE
// =============================================
function tomatoShape(scale, cx, cy, count) {
 const points = [];
 const outlineCount = Math.floor(count * 0.35);
 for (let i = 0; i < outlineCount; i++) {
 const angle = (i / outlineCount) * Math.PI * 2;
 let rx = scale * 1.0;
 let ry = scale * 0.88;
 const indent = (1 - Math.abs(Math.sin(angle))) * 0.15;
 if (angle > Math.PI * 0.3 && angle < Math.PI * 0.7) {
 ry *= (1 - indent * 1.5);
 }
 if (angle > Math.PI * 1.3 && angle < Math.PI * 1.7) {
 ry *= 0.97;
 }
 const x = cx + rx * Math.cos(angle);
 const y = cy + ry * Math.sin(angle);
 points.push({ x, y });
 }
 const fillCount = Math.floor(count * 2.5);
 for (let i = 0; i < fillCount; i++) {
 const angle = rand(0, Math.PI * 2);
 const r = Math.sqrt(Math.random());
 let rx = scale * 1.0;
 let ry = scale * 0.88;
 const x = cx + r * rx * Math.cos(angle);
 const y = cy + r * ry * Math.sin(angle);
 points.push({ x, y });
 }
 const calyxCount = Math.floor(count * 0.25);
 const calyxY = cy - scale * 0.82;
 for (let i = 0; i < calyxCount; i++) {
 const leaf = Math.floor(rand(0, 5));
 const leafAngle = (leaf / 5) * Math.PI * 2 - Math.PI / 2;
 const t = rand(0.1, 1.0);
 const leafLen = scale * 0.45;
 const leafWidth = scale * 0.12;
 const baseX = cx;
 const baseY = calyxY;
 const tipX = baseX + Math.cos(leafAngle) * leafLen * t;
 const tipY = baseY + Math.sin(leafAngle) * leafLen * t;
 const perpX = -Math.sin(leafAngle) * leafWidth * (1 - t) * rand(-1, 1);
 const perpY = Math.cos(leafAngle) * leafWidth * (1 - t) * rand(-1, 1);
 points.push({ x: tipX + perpX, y: tipY + perpY });
 }
 const stemCount = Math.floor(count * 0.12);
 for (let i = 0; i < stemCount; i++) {
 const t = rand(0, 1);
 const x = cx + rand(-1, 1) * scale * 0.03;
 const y = calyxY - t * scale * 0.5;
 points.push({ x, y });
 }
 const hlCount = Math.floor(count * 0.08);
 for (let i = 0; i < hlCount; i++) {
 const angle = rand(-0.8, 0.3);
 const r = rand(0.2, 0.55) * scale;
 const x = cx + r * Math.cos(angle) + scale * 0.25;
 const y = cy + r * Math.sin(angle) - scale * 0.2;
 points.push({ x, y });
 }
 return points;
}

// =============================================
// BUTTERFLY SHAPE
// =============================================
function butterflyShape(scale, cx, cy, count) {
 const points = [];

 function wingOutline(side, isUpper, numPts) {
 const pts = [];
 for (let i = 0; i < numPts; i++) {
 const t = (i / numPts);
 let wx, wy;
 if (isUpper) {
 const angle = t * Math.PI * 0.95 + Math.PI * 0.05;
 const rWing = scale * (1.1 + 0.25 * Math.sin(angle * 1.5));
 wx = side * rWing * Math.pow(Math.sin(angle), 0.6);
 wy = -rWing * Math.cos(angle) * 0.55;
 } else {
 const angle = t * Math.PI * 0.85 + Math.PI * 0.08;
 const rWing = scale * (0.7 + 0.15 * Math.sin(angle * 2));
 wx = side * rWing * Math.pow(Math.sin(angle), 0.7);
 wy = rWing * Math.cos(angle) * 0.45;
 }
 pts.push({ x: cx + wx, y: cy + wy });
 }
 return pts;
 }

 points.push(...wingOutline(1, true, Math.floor(count * 0.15)));
 points.push(...wingOutline(1, false, Math.floor(count * 0.12)));
 points.push(...wingOutline(-1, true, Math.floor(count * 0.15)));
 points.push(...wingOutline(-1, false, Math.floor(count * 0.12)));

 const fillCount = Math.floor(count * 3.5);
 for (let i = 0; i < fillCount; i++) {
 const side = Math.random() > 0.5 ? 1 : -1;
 const isUpper = Math.random() > 0.4;
 const t = rand(0.1, 0.95);
 let wx, wy;
 if (isUpper) {
 const rWing = scale * (1.1 + 0.25 * Math.sin(t * Math.PI * 1.5)) * t;
 const angle = t * Math.PI * 0.95;
 wx = side * rWing * Math.pow(Math.sin(angle), 0.6);
 wy = -rWing * Math.cos(angle) * 0.55;
 } else {
 const rWing = scale * (0.7 + 0.15 * Math.sin(t * Math.PI * 2)) * t;
 const angle = t * Math.PI * 0.85;
 wx = side * rWing * Math.pow(Math.sin(angle), 0.7);
 wy = rWing * Math.cos(angle) * 0.45;
 }
 points.push({ x: cx + wx, y: cy + wy });
 }

 for (let i = 0; i < Math.floor(count * 0.15); i++) {
 const side = i < count * 0.075 ? 1 : -1;
 const spotCx = cx + side * scale * 0.55;
 const spotCy = cy - scale * 0.25;
 const spotR = rand(0, scale * 0.18);
 const spotAngle = rand(0, Math.PI * 2);
 points.push({ x: spotCx + spotR * Math.cos(spotAngle), y: spotCy + spotR * Math.sin(spotAngle) });
 }
 for (let i = 0; i < Math.floor(count * 0.08); i++) {
 const side = i < count * 0.04 ? 1 : -1;
 const spotCx = cx + side * scale * 0.35;
 const spotCy = cy + scale * 0.2;
 const spotR = rand(0, scale * 0.12);
 const spotAngle = rand(0, Math.PI * 2);
 points.push({ x: spotCx + spotR * Math.cos(spotAngle), y: spotCy + spotR * Math.sin(spotAngle) });
 }

 const bodyCount = Math.floor(count * 0.15);
 for (let i = 0; i < bodyCount; i++) {
 const t = rand(-1, 1);
 const bodyWidth = scale * 0.035 * (1 - Math.abs(t) * 0.3);
 points.push({ x: cx + rand(-1, 1) * bodyWidth, y: cy + t * scale * 0.6 });
 }

 const antCount = Math.floor(count * 0.1);
 for (let i = 0; i < antCount; i++) {
 const side = i < antCount / 2 ? 1 : -1;
 const t = rand(0, 1);
 const curvature = Math.sin(t * Math.PI) * 0.3;
 const len = scale * 0.65;
 const x = cx + side * t * len * 0.4 + curvature * side * scale * 0.15;
 const y = cy - scale * 0.6 - t * len * 0.7;
 const isTip = t > 0.85;
 const ballR = isTip ? rand(0, scale * 0.04) : 0;
 points.push({ x: x + rand(-1,1) * ballR, y: y + rand(-1,1) * ballR });
 }
 return points;
}

// =============================================
// HEART SHAPE — v12 散射法（无中线）+ 更多粒子
// =============================================
function heartShape(scale, cx, cy, count) {
 const points = [];
 // 预计算心形表面点
 const surfacePts = [];
 for (let i = 0; i < 240; i++) {
 const t = (i / 240) * Math.PI * 2;
 const x = 16 * Math.pow(Math.sin(t), 3);
 const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
 surfacePts.push({ x, y });
 }
 // 大部分点靠近表面（边界清晰），少部分填充内部
 const halfCount = Math.floor(count * 0.65);
 for (let i = 0; i < halfCount; i++) {
 const sp = surfacePts[Math.floor(rand(0, surfacePts.length))];
 const offsetX = rand(-2, 2);
 const offsetY = rand(-2, 2);
 const px = sp.x * rand(0.85, 1.05) + offsetX;
 const py = sp.y * rand(0.85, 1.05) + offsetY;
 points.push({ x: cx + px * scale, y: cy + py * scale });
 }
 // 内部填充
 for (let i = halfCount; i < count; i++) {
 const sp = surfacePts[Math.floor(rand(0, surfacePts.length))];
 const offsetX = rand(-3, 3);
 const offsetY = rand(-3, 3);
 const px = sp.x * rand(0.2, 0.85) + offsetX;
 const py = sp.y * rand(0.2, 0.85) + offsetY;
 points.push({ x: cx + px * scale, y: cy + py * scale });
 }
 return points;
}

// === Particle Class ===
class Particle {
 constructor(target, color, size) {
 this.targetX = target.x;
 this.targetY = target.y;
 this.origX = target.x;
 this.origY = target.y;
 this.x = rand(0, W);
 this.y = rand(0, H);
 this.vx = 0;
 this.vy = 0;
 this.color = color;
 this.size = size;
 this.baseSize = size;
 this.wobble = rand(0, Math.PI * 2);
 this.wobbleSpeed = rand(0.01, 0.03);
 this.wobbleAmp = rand(1, 3);
 }
 update(floatY = 0) {
 this.wobble += this.wobbleSpeed;
 const tx = this.targetX + Math.sin(this.wobble) * this.wobbleAmp;
 const ty = this.targetY + floatY + Math.cos(this.wobble * 0.7) * this.wobbleAmp;
 const dx = tx - this.x;
 const dy = ty - this.y;
 this.vx += dx * 0.04;
 this.vy += dy * 0.04;
 this.vx *= 0.88;
 this.vy *= 0.88;
 this.x += this.vx;
 this.y += this.vy;
 this.size = this.baseSize * (0.8 + 0.2 * Math.sin(this.wobble * 2));
 }
 draw() {
 // 移动端简化渲染（去掉径向渐变发光，太耗性能）
 ctx.beginPath();
 ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
 ctx.fillStyle = this.color;
 ctx.fill();
 // 只在桌面端加发光效果
 if (W >= 768) {
 ctx.beginPath();
 ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
 const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
 g.addColorStop(0, this.color);
 g.addColorStop(1, 'transparent');
 ctx.fillStyle = g;
 ctx.fill();
 }
 }
}

// === Create Particle Groups ===
let heartParticles = [];
let tomatoParticles = [];
let butterflyParticles = [];
let bgParticles = [];

function createAll() {
 heartParticles = [];
 tomatoParticles = [];
 butterflyParticles = [];
 bgParticles = [];

 // Heart — 移动端优化：减少粒子、简化渲染
 const heartScale = Math.min(W, H) * 0.022;
 const heartCx = W * 0.5;
 const heartCy = H * 0.48;
 const isMobile = W < 768;
 const heartPts = heartShape(heartScale, heartCx, heartCy, isMobile ? 500 : 2000);
 const heartColors = ['#ff3366', '#ff4488', '#ff6b9d', '#ff2244', '#ff5577', '#e83570'];
 heartPts.forEach(p => {
 heartParticles.push(new Particle(p, heartColors[Math.floor(rand(0, heartColors.length))], isMobile ? rand(1.0, 2.0) : rand(0.8, 1.6)));
 });

 // Tomato
 const tomatoScale = Math.min(W, H) * 0.055;
 const tomatoCx = W * 0.22;
 const tomatoCy = H * 0.52;
 const tomatoPts = tomatoShape(tomatoScale, tomatoCx, tomatoCy, isMobile ? 40 : 100);
 const tomatoColors = ['#ff3333', '#ff4444', '#ee2222', '#ff5544', '#dd2222', '#66cc33', '#55aa22', '#44aa44', '#338833'];
 tomatoPts.forEach(p => {
 const isGreen = p.y < tomatoCy - tomatoScale * 0.7;
 const color = isGreen
 ? tomatoColors[Math.floor(rand(5, tomatoColors.length))]
 : tomatoColors[Math.floor(rand(0, 5))];
 tomatoParticles.push(new Particle(p, color, rand(1.2, 2.8)));
 });

 // Butterfly
 const bflyScale = Math.min(W, H) * 0.058;
 const bflyCx = W * 0.78;
 const bflyCy = H * 0.50;
 const bflyPts = butterflyShape(bflyScale, bflyCx, bflyCy, isMobile ? 40 : 100);
 const originalWingColors = ['#9b59b6', '#8e44ad', '#c39bd3', '#a569bd', '#d2b4de', '#7d3c98', '#bb8fce', '#5b2c6f'];
 const bodyNewColor = '#FFD966';
 const antennaNewColor = '#FFC857';
 bflyPts.forEach(p => {
 const dxFromCenter = Math.abs(p.x - bflyCx);
 const isBodyArea = dxFromCenter < bflyScale * 0.09;
 const isAntennaArea = p.y < bflyCy - bflyScale * 0.55 && dxFromCenter > bflyScale * 0.08;
 let color;
 if (isBodyArea || isAntennaArea) {
 color = isAntennaArea ? antennaNewColor : bodyNewColor;
 } else {
 color = originalWingColors[Math.floor(rand(0, originalWingColors.length))];
 }
 butterflyParticles.push(new Particle(p, color, rand(1.2, 2.8)));
 });

 for (let i = 0; i < (isMobile ? 20 : 60); i++) {
 bgParticles.push({
 x: rand(0, W), y: rand(0, H),
 size: rand(0.5, 2), speed: rand(0.1, 0.4),
 opacity: rand(0.1, 0.4), wobble: rand(0, Math.PI * 2)
 });
 }
}
createAll();

// === Animation ===
let time = 0;
function animate() {
 time += 0.016;
 ctx.clearRect(0, 0, W, H);

 // Background particles
 bgParticles.forEach(p => {
 p.y -= p.speed;
 p.wobble += 0.01;
 p.x += Math.sin(p.wobble) * 0.3;
 if (p.y < -10) { p.y = H + 10; p.x = rand(0, W); }
 ctx.beginPath();
 ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
 ctx.fillStyle = `rgba(255, 107, 157, ${p.opacity})`;
 ctx.fill();
 });

 // Heart: float + breathe（来自文件1的原始运动）
 const heartFloat = Math.sin(time * 0.8) * 12;
 const heartScaleAnim = 1 + 0.04 * Math.sin(time * 2.5);
 heartParticles.forEach(p => {
 const cx = W * 0.5, cy = H * 0.48;
 p.targetX = cx + (p.origX - cx) * heartScaleAnim;
 p.targetY = cy + (p.origY - cy) * heartScaleAnim;
 p.update(heartFloat);
 p.draw();
 });

 // Tomato: gentle sway
 tomatoParticles.forEach(p => {
 const sway = Math.sin(time * 0.5 + p.wobble) * 3;
 p.targetX = p.origX + sway;
 p.targetY = p.origY;
 p.update();
 p.draw();
 });

 // Butterfly: 3D-like wing flap
 const bflyCx = W * 0.78;
 butterflyParticles.forEach(p => {
 const dx = p.origX - bflyCx;
 const isWing = Math.abs(dx) > 8;
 if (isWing) {
 const flapAngle = Math.sin(time * 2.2) * 0.35;
 p.targetX = bflyCx + dx * Math.cos(flapAngle);
 p.targetY = p.origY - Math.abs(dx) * Math.sin(flapAngle) * 0.3;
 } else {
 p.targetX = p.origX;
 p.targetY = p.origY;
 }
 p.update(Math.sin(time * 0.7 + 1) * 2);
 p.draw();
 });

 requestAnimationFrame(animate);
}
animate();

// 每分钟更新天数
setInterval(() => {
 const n = new Date();
 const d = Math.floor(Math.abs(n - startDate) / (1000 * 60 * 60 * 24));
 document.getElementById('dayCount').textContent = d;
}, 60000);
</script>
</body>
</html>
